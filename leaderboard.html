<!DOCTYPE html>
<html>
<head>
    <title>Breakout – Leaderboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #09f1b8; font-size: 20px; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 10px; margin-bottom: 30px; }
        table { border-collapse: collapse; width: 100%; max-width: 700px; }
        th { color: #09f1b8; font-size: 11px; text-align: left; padding: 10px 12px; border-bottom: 2px solid #333; }
        td { font-size: 11px; padding: 10px 12px; border-bottom: 1px solid #222; }
        tr:first-child td { color: #fed90f; }
        tr:nth-child(2) td { color: #ccc; }
        tr:nth-child(3) td { color: #a0522d; }
        .rank { width: 40px; text-align: center; }
        .empty { color: #444; text-align: center; padding: 40px; font-size: 12px; }
        a { color: #09f1b8; text-decoration: none; font-size: 11px; margin-top: 30px; }
        a:hover { color: #fed90f; }
        .actions { margin-top: 20px; display: flex; gap: 20px; }
        button {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 8px 16px;
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #ff4444; color: #000; }
    </style>
</head>
<body>
    <h1>🏆 LEADERBOARD</h1>
    <p class="subtitle">All scores from this browser</p>

    <table>
        <thead>
            <tr>
                <th class="rank">#</th>
                <th>Name</th>
                <th>Score</th>
                <th>Level</th>
                <th>Time Left</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="lb-body"></tbody>
    </table>

    <div class="actions">
        <a href="index.html">← BACK TO GAME</a>
        <button onclick="clearScores()">CLEAR ALL SCORES</button>
    </div>

    <script>
        function getAllScores() {
            try { return JSON.parse(localStorage.getItem('breakout_all')) || []; }
            catch (e) { return []; }
        }

        function render() {
            var scores = getAllScores();
            scores.sort(function(a, b) { return b.score - a.score; });
            var tbody = document.getElementById('lb-body');
            tbody.innerHTML = '';

            if (scores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">No scores yet — go play!</td></tr>';
                return;
            }

            for (var i = 0; i < scores.length; i++) {
                var s = scores[i];
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="rank">' + (i + 1) + '</td>' +
                    '<td>' + (s.name || '???') + '</td>' +
                    '<td>' + s.score + ' pts</td>' +
                    '<td>L' + (s.level || '?') + '</td>' +
                    '<td>' + (s.timeLeft != null ? s.timeLeft + 's' : '-') + '</td>' +
                    '<td>' + (s.date || '-') + '</td>';
                tbody.appendChild(tr);
            }
        }

        function clearScores() {
            if (confirm('Clear all scores? This cannot be undone.')) {
                localStorage.removeItem('breakout_all');
                render();
            }
        }

        render();
    </script>
</body>
</html>
